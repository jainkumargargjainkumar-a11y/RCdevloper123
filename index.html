<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGBSE Exam Portal 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --blue: #1a5f7a; --green: #27ae60; --red: #e74c3c; --dark: #2c3e50; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 5px; }
        .main-card { max-width: 100%; width: 95%; margin: 10px auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #ccc; overflow: hidden; }
        .header { background: var(--blue); color: white; text-align: center; padding: 15px; border-bottom: 4px solid #f39c12; position: relative; }
        .tabs { display: flex; background: #eee; }
        .tab-btn { flex: 1; padding: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .active-tab { background: white; color: var(--blue); border-top: 2px solid var(--blue); }
        .content { padding: 10px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 10px; border: 1px solid #444; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; font-size: 0.75rem; }
        th, td { border: 1px solid #444; padding: 6px; text-align: center; }
        .hidden { display: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; color: white; }
        .section-box { background: #f9f9f9; padding: 10px; border: 1px solid #ddd; margin-bottom: 15px; border-radius: 5px; }
        .input-label { font-size: 0.65rem; font-weight: bold; color: #555; display: block; margin-bottom: 2px; }
        .sub-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; background: #fff; padding: 5px; border-radius: 4px; border: 1px solid #eee; }
        #logout-btn { position: absolute; right: 10px; top: 15px; background: #ff4757; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        .sub-grid { font-size: 0.7rem; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; padding: 5px; border: 1px dashed #bbb; border-radius: 4px; }
        .group-title { font-size: 0.75rem; font-weight: bold; color: var(--blue); margin-top: 10px; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h2 style="margin:0; font-size:1rem;">CGBSE RESULT SYSTEM</h2>
        <p style="margin:5px 0 0; font-size:0.7rem;">CPS Baloda Bazar, CG</p>
        <button id="logout-btn" class="hidden" onclick="logout()">LOGOUT</button>
    </div>

    <div class="tabs">
        <button id="t1" class="tab-btn active-tab" onclick="openTab('student')">STUDENT VIEW</button>
        <button id="t2" class="tab-btn" onclick="checkPass()">DEVELOPER</button>
    </div>

    <div class="content">
        <div id="student-sec">
            <input type="text" id="search-roll" placeholder="Roll Number Daalein">
            <button class="btn" style="background:var(--blue);" onclick="generateMarksheet()">VIEW RESULT</button>
            <div id="final-marksheet" class="hidden" style="border: 2px solid #333; padding:15px; margin-top:15px; background:#fff;">
                <h4 style="text-align:center; margin:0 0 10px 0; text-decoration:underline;">MARK STATEMENT</h4>
                <div id="student-bio" style="font-size:0.8rem; line-height:1.5; display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:10px;"></div>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>Subject</th><th>Max</th><th>Th</th><th>Pr</th><th>Gr</th><th>Total</th><th>Status</th></tr></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
                <div id="final-stats" style="margin-top:15px; font-size:0.85rem; border-top:1px dashed #666; padding-top:10px;"></div>
                <button onclick="window.print()" style="margin-top:10px; width:100%; background:#333; color:white; padding:8px; border:none;">DOWNLOAD PDF</button>
            </div>
        </div>

        <div id="admin-sec" class="hidden">
            <div class="section-box">
                <h4 style="margin:0 0 10px 0; color:var(--blue);">Student Registration (9th/11th)</h4>
                <input type="text" id="name" placeholder="Student Name">
                <input type="text" id="roll" placeholder="Roll Number">
                <input type="text" id="fname" placeholder="Father's Name">
                <input type="text" id="mname" placeholder="Mother's Name">
                
                <select id="class-name" onchange="updateSubjectUI()">
                    <option value="">-- Class Chunein --</option>
                    <option value="9th">9th Standard</option>
                    <option value="11th Arts">11th Arts</option>
                    <option value="11th Science">11th Science</option>
                    <option value="11th Math">11th Math</option>
                    <option value="11th Commerce">11th Commerce</option>
                </select>
                
                <div id="sub-container" class="hidden">
                    <div class="group-title">Main Subjects:</div>
                    <div id="main-subs" class="sub-grid"></div>
                    
                    <div class="group-title">Vocational (Common for All):</div>
                    <div id="voc-subs" class="sub-grid">
                        <label><input type="checkbox" class="sub-check" value="I.T."> I.T.</label>
                        <label><input type="checkbox" class="sub-check" value="Health Care"> Health Care</label>
                    </div>
                </div>
                
                <button onclick="loadInputs()" class="btn" style="background:#555; margin-top:15px;">LOAD MARKS FIELDS</button>
                <div id="marks-area" style="margin-top:10px;"></div>
                <button onclick="saveData()" class="btn" style="background:var(--green); margin-top:10px;">SAVE DATA</button>
            </div>

            <div class="section-box">
                <button onclick="showAllData()" class="btn" style="background:#777;">VIEW SAVED LIST</button>
                <div id="admin-list" class="table-wrapper"></div>
                <button onclick="clearEntireDB()" class="btn" style="background:black; margin-top:20px;">DELETE ALL</button>
            </div>
        </div>
    </div>
</div>

<script>
    const MASTER_PASS = "ramesh garg x cps baloda Bazar 123";
    let isUnlocked = false;

    function getDB() { return JSON.parse(localStorage.getItem('cgbse_v_ultimate')) || []; }

    function openTab(name) {
        if(name === 'admin' && !isUnlocked) return;
        document.getElementById('student-sec').classList.toggle('hidden', name !== 'student');
        document.getElementById('admin-sec').classList.toggle('hidden', name !== 'admin');
        document.getElementById('t1').classList.toggle('active-tab', name === 'student');
        document.getElementById('t2').classList.toggle('active-tab', name === 'admin');
        document.getElementById('logout-btn').classList.toggle('hidden', !isUnlocked || name === 'student');
    }

    function checkPass() {
        if(isUnlocked) { openTab('admin'); return; }
        let p = prompt("Developer Password:");
        if(p === MASTER_PASS) { isUnlocked = true; openTab('admin'); }
    }

    function logout() { isUnlocked = false; location.reload(); }

    function updateSubjectUI() {
        const cls = document.getElementById('class-name').value;
        const mainSubs = document.getElementById('main-subs');
        const container = document.getElementById('sub-container');
        
        if(!cls) { container.classList.add('hidden'); return; }
        container.classList.remove('hidden');

        let subs = [];
        if(cls === "9th") subs = ["Hindi", "English", "Sanskrit", "Math", "Science", "S. Science"];
        else if(cls === "11th Arts") subs = ["Hindi", "English", "History", "Pol. Science", "Economics", "Geography"];
        else if(cls === "11th Science") subs = ["Hindi", "English", "Physics", "Chemistry", "Biology"];
        else if(cls === "11th Math") subs = ["Hindi", "English", "Physics", "Chemistry", "Math"];
        else if(cls === "11th Commerce") subs = ["Hindi", "English", "Accountancy", "Business Studies", "Economics"];

        mainSubs.innerHTML = subs.map(s => `<label><input type="checkbox" class="sub-check" value="${s}" checked> ${s}</label>`).join('');
    }

    function loadInputs() {
        const selected = Array.from(document.querySelectorAll('.sub-check:checked')).map(cb => cb.value);
        const cls = document.getElementById('class-name').value;
        const area = document.getElementById('marks-area');
        area.innerHTML = "";
        
        selected.forEach(s => {
            let isVoc = (s === "I.T." || s === "Health Care");
            let maxTh = isVoc ? 50 : (cls === "9th" ? 75 : 80);
            let maxPr = isVoc ? 50 : (cls === "9th" ? 25 : 20);
            
            area.innerHTML += `
                <div class="sub-row" data-sname="${s}">
                    <div style="font-size:0.65rem; font-weight:bold; align-self:center;">${s}</div>
                    <div><span class="input-label">Th (${maxTh})</span><input type="number" class="th" value="0" onfocus="if(this.value=='0')this.value=''"></div>
                    <div><span class="input-label">Pr (${maxPr})</span><input type="number" class="pr" value="0" onfocus="if(this.value=='0')this.value=''"></div>
                    <div><span class="input-label">Gr</span><input type="number" class="gr" value="0" onfocus="if(this.value=='0')this.value=''"></div>
                </div>`;
        });
    }

    function saveData() {
        let db = getDB();
        const cls = document.getElementById('class-name').value;
        const rows = document.querySelectorAll('.sub-row[data-sname]');
        let marks = [], gTotal = 0;
        
        rows.forEach(r => {
            let s = r.dataset.sname;
            let th = parseInt(r.querySelector('.th').value) || 0;
            let pr = parseInt(r.querySelector('.pr').value) || 0;
            let gr = parseInt(r.querySelector('.gr').value) || 0;
            let isVoc = (s === "I.T." || s === "Health Care");
            let passTh = isVoc ? 33 : (cls === "9th" ? 25 : 27);
            let total = th + pr + gr;
            let isPass = ((th + gr) >= passTh && total >= 33);
            gTotal += total;
            marks.push({ name: s, th, pr, gr, total, isPass, max: isVoc?"50+50":(cls==="9th"?"75+25":"80+20") });
        });

        const std = { 
            roll: document.getElementById('roll').value, name: document.getElementById('name').value, 
            father: document.getElementById('fname').value, mother: document.getElementById('mname').value, 
            cls, marks, gTotal, maxTotal: (marks.length * 100) 
        };

        if(!std.roll || !std.name || !cls) return alert("Puri detail bharein!");
        db.push(std);
        localStorage.setItem('cgbse_v_ultimate', JSON.stringify(db));
        alert("Data Saved Successfully!");
        document.getElementById('name').value=""; document.getElementById('roll').value=""; document.getElementById('marks-area').innerHTML="";
    }

    function generateMarksheet() {
        let db = getDB();
        let roll = document.getElementById('search-roll').value;
        let s = db.find(x => x.roll === roll);
        if(!s) return alert("Record Not Found!");

        document.getElementById('final-marksheet').classList.remove('hidden');
        document.getElementById('student-bio').innerHTML = `
            <div><b>Name:</b> ${s.name}</div><div><b>Roll:</b> ${s.roll}</div>
            <div><b>Father:</b> ${s.father}</div><div><b>Mother:</b> ${s.mother}</div>
            <div><b>Class:</b> ${s.cls}</div><div><b>Dist:</b> Baloda Bazar</div>`;

        let tbody = "", fCount = 0;
        s.marks.forEach(m => {
            if(!m.isPass) fCount++;
            tbody += `<tr><td>${m.name}</td><td>${m.max}</td><td>${m.th}</td><td>${m.pr}</td><td>${m.gr}</td><td>${m.total}</td><td style="color:${m.isPass?'green':'red'}">${m.isPass?'PASS':'FAIL'}</td></tr>`;
        });
        document.getElementById('table-body').innerHTML = tbody;
        let per = ((s.gTotal / s.maxTotal) * 100).toFixed(2);
        let res = (fCount === 0) ? "PASSED" : (fCount <= 2 ? "SUPPLEMENTARY" : "FAILED");
        if(res === "PASSED" && per >= 60) confetti();
        document.getElementById('final-stats').innerHTML = `<b>Total:</b> ${s.gTotal}/${s.maxTotal} | <b>%:</b> ${per}% | <b>Result:</b> ${res}`;
    }

    function showAllData() {
        let db = getDB();
        let html = `<table><tr><th>Roll</th><th>Name</th><th>Del</th></tr>`;
        db.forEach((s, i) => { html += `<tr><td>${s.roll}</td><td>${s.name}</td><td><button onclick="delOne(${i})" style="color:red">X</button></td></tr>`; });
        document.getElementById('admin-list').innerHTML = db.length ? html + "</table>" : "No Records Found";
    }
    function delOne(i) { let db = getDB(); db.splice(i,1); localStorage.setItem('cgbse_v_ultimate', JSON.stringify(db)); showAllData(); }
    function clearEntireDB() { localStorage.removeItem('cgbse_v_ultimate'); location.reload(); }
</script>
</body>
</html>
